{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h2>用户登录</h2>

        {% if form.errors %}
            <div class="error-message">
                <p>用户名不存在或密码错误，请重试。</p>
            </div>
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">用户名</label>
                <input type="text"
                       name="username"
                       id="id_username"
                       class="form-control"
                       placeholder="请输入用户名"
                       value="{{ form.username.value|default_if_none:'' }}"
                       required>
            </div>

            <div class="form-group">
                <label for="id_password">密码</label>
                <input type="password"
                       name="password"
                       id="id_password"
                       class="form-control"
                       placeholder="请输入密码"
                       required>
            </div>

            <button type="submit" class="btn-login">立即登录</button>
        </form>

        <div class="login-footer">
            <p>还没有账号？ <a href="{% url 'register' %}">去注册</a></p>
        </div>
    </div>
</div>

<style>
    /* 页面居中背景 */
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh; /* 让登录框垂直居中 */
        background-color: #f4f6f9;
    }

    /* 登录卡片样式 */
    .login-box {
        background: white;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-weight: 600;
    }

    /* 输入框组 */
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 16px;
        box-sizing: border-box; /* 防止padding撑破宽度 */
        transition: border-color 0.3s;
    }

    .form-control:focus {
        border-color: #2c6cbf;
        outline: none;
    }

    /* 登录按钮 */
    .btn-login {
        width: 100%;
        padding: 12px;
        background-color: #2c6cbf;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-login:hover {
        background-color: #1a4e91;
    }

    /* 错误提示框 */
    .error-message {
        background-color: #ffebee;
        color: #c62828;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 20px;
        text-align: center;
        font-size: 14px;
        border: 1px solid #ffcdd2;
    }

    /* 底部链接 */
    .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #666;
    }

    .login-footer a {
        color: #2c6cbf;
        text-decoration: none;
        font-weight: bold;
    }
</style>
{% endblock %}
